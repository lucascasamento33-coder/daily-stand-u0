<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Daily Brief</title>
<style>
  html,body{margin:0;height:100%;background:#f4efe6;color:#1a1a1a;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;}
  #load{display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100%;text-align:center;padding:24px;box-sizing:border-box;}
  #load h1{font-size:34px;letter-spacing:1px;margin:0 0 6px;font-weight:800;}
  #load h1 span{color:#d4501e;}
  #load p{font-size:15px;color:#555;margin:4px 0;}
  .dot{display:inline-block;width:8px;height:8px;margin:0 3px;border-radius:50%;
    background:#d4501e;opacity:.3;animation:b 1.2s infinite;}
  .dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
  @keyframes b{0%,80%,100%{opacity:.3}40%{opacity:1}}
  #fail a{color:#d4501e;font-weight:700;text-decoration:none;}
</style>
</head>
<body>
<div id="load">
  <h1>DAILY <span>BRIEF</span></h1>
  <p>Loading the latest brief<span class="dot"></span><span class="dot"></span><span class="dot"></span></p>
  <div id="fail" style="display:none;margin-top:14px;">
    <p>Couldn't find a recent brief automatically.</p>
    <p id="faillink"></p>
  </div>
</div>
<script>
(function () {
  function etParts(offsetDays) {
    var d = new Date(Date.now() + offsetDays * 86400000);
    var f = new Intl.DateTimeFormat('en-CA', {
      timeZone: 'America/New_York', year: 'numeric', month: '2-digit', day: '2-digit'
    });
    return f.format(d);
  }
  var MAX_BACK = 10;
  function fileFor(i) { return 'brief-' + etParts(-i) + '.html'; }
  async function exists(url) {
    try {
      var r = await fetch(url, { method: 'HEAD', cache: 'no-store' });
      if (r.ok) return true;
    } catch (e) {}
    try {
      var r2 = await fetch(url, { method: 'GET', cache: 'no-store' });
      return r2.ok;
    } catch (e) {}
    return false;
  }
  (async function () {
    for (var i = 0; i <= MAX_BACK; i++) {
      var url = fileFor(i);
      if (await exists(url)) { window.location.replace(url); return; }
    }
    var latest = fileFor(0);
    document.getElementById('faillink').innerHTML =
      'Try opening <a href="' + latest + '">the latest brief</a> directly.';
    document.getElementById('fail').style.display = 'block';
  })();
})();
</script>
</body>
</html>
